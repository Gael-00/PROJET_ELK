<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .profile-img{
            width: 120px;
            height: 120px;
            object-fit: cover;
            border: 4px solid #f8f9fa;
        }
    </style>
    <title>Groupe 41 - Membres</title>
</head>
<body class="bg-light">
{% load static %}
    <div class="container py-5">
        <h1 class="text-center mb-5 text-primary">Membres du Groupe 41</h1>

        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for membre in membres %}
            <div class="col">
                <div class="card h-100 shadow border-0 text-center p-3">
                    <div class="mt-3">
                        <img src="{% static membre.photo %}" class="rounded-circle profile-img shadow-sm" alt="{{ membre.nom }}">
                    </div>
                    <div class="card-body">
                        <h5 class="card-title fw-bold">{{ membre.nom }}</h5>
                        <h6 class="card-subtitle mb-3 text-primary">{{ membre.role }}</h6>
                        <p class="card-text text-muted small">Membre actif du Groupe 41 - M1 Informatique UNIKIN.</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
